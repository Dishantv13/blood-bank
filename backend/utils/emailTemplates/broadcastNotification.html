<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f4f5; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e4e4e7; }
        .header { background: #1f2937; color: white; padding: 30px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
        .content { padding: 30px; }
        .title { color: #111827; font-size: 22px; font-weight: 700; margin-bottom: 20px; line-height: 1.3; }
        .message-box { background: #f9fafb; border-radius: 8px; padding: 20px; border-left: 4px solid #ef4444; margin-bottom: 25px; }
        .message-text { color: #4b5563; font-size: 15px; margin: 0; }
        .footer { background: #f9fafb; padding: 20px; text-align: center; font-size: 12px; color: #9ca3af; border-top: 1px solid #e5e7eb; }
        .footer a { color: #ef4444; text-decoration: none; }
        .btn-wrapper { text-align: center; margin-top: 25px; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #ef4444; color: white !important; text-decoration: none; border-radius: 6px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RaktSarthi Community Update</h1>
        </div>
        <div class="content">
            <p style="margin-top: 0; color: #6b7280;">Hello {{name}},</p>
            <div class="title">{{title}}</div>
            <div class="message-box">
                <p class="message-text">{{message}}</p>
            </div>
            <div class="btn-wrapper">
                <a href="http://localhost:3000/dashboard" class="btn">Open Dashboard</a>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 RaktSarthi. All rights reserved.</p>
            <p>You are receiving this update as a member of our community. <a href="{{unsubscribeUrl}}">Unsubscribe</a></p>
        </div>
    </div>
</body>
</html>
